name: greetings
on: [push]
jobs:
  print-hello:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2
      - name: Checkout
        run: git fetch main 98e446f
        run: git checkout HEAD^
      - name: Greetings
        run: echo "$(<Greetings.txt)"

